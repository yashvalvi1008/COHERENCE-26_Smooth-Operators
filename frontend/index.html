<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BudgetFlow Intelligence</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="app">

    <!-- ── Sidebar ── -->
    <nav id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">◈</div>
        <div class="brand-text">
          <span class="brand-title">BudgetFlow</span>
          <span class="brand-sub">Intelligence Platform</span>
        </div>
      </div>

      <div class="nav-group-label">MAIN</div>
      <ul class="nav-list">
        <li>
          <a class="nav-item active" data-page="overview" href="#overview">
            <span class="nav-ico">⊞</span><span>Overview</span>
          </a>
        </li>
        <li>
          <a class="nav-item" data-page="fund-flow" href="#fund-flow">
            <span class="nav-ico">⤳</span><span>Fund Flow</span>
          </a>
        </li>
      </ul>

      <div class="nav-group-label">ANALYTICS</div>
      <ul class="nav-list">
        <li>
          <a class="nav-item" data-page="anomalies" href="#anomalies">
            <span class="nav-ico">⚑</span>
            <span>Anomaly Log</span>
            <span class="nav-badge" id="nav-badge-anomaly">–</span>
          </a>
        </li>
        <li>
          <a class="nav-item" data-page="predictor" href="#predictor">
            <span class="nav-ico">▲</span><span>Predictive Risk</span>
          </a>
        </li>
        <li>
          <a class="nav-item" data-page="optimizer" href="#optimizer">
            <span class="nav-ico">⟳</span><span>Optimizer</span>
          </a>
        </li>
      </ul>

      <div class="nav-group-label">GEO</div>
      <ul class="nav-list">
        <li>
          <a class="nav-item" data-page="districts" href="#districts">
            <span class="nav-ico">◎</span><span>Districts</span>
          </a>
        </li>
      </ul>

      <div class="sidebar-footer">
        <div class="fy-chip">
          <span class="fy-label">FY</span>
          <span class="fy-val" id="sidebar-fy">2024-25</span>
        </div>
        <button class="btn-scan" id="btn-scan" title="Run anomaly scan">
          ⟳ Run Scan
        </button>
      </div>
    </nav>

    <!-- ── Main ── -->
    <div id="main-wrap">
      <header id="topbar">
        <div id="topbar-breadcrumb">Overview</div>
        <div id="topbar-right">
          <div class="alert-dot hidden" id="topbar-alert-dot" title="Active alerts"></div>
          <div class="last-scan-info" id="last-scan-info">No scan run yet</div>
        </div>
      </header>

      <main id="page-root">
        <!-- Pages injected here by JS -->
        <div class="page-loader" id="page-loader">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </main>
    </div>

  </div><!-- #app -->

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Scripts (order matters) -->
  <script src="/js/api.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/pages/overview.js"></script>
  <script src="/js/pages/fundflow.js"></script>
  <script src="/js/pages/anomaly.js"></script>
  <script src="/js/pages/predictor.js"></script>
  <script src="/js/pages/optimizer.js"></script>
  <script src="/js/pages/districts.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
